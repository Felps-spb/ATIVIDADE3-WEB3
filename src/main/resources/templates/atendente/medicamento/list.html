<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Medicamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/atendente">Sistema Médico</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/atendente/pacientes">Pacientes</a>
            <a class="nav-link" href="/atendente/medicos">Médicos</a>
            <a class="nav-link active" href="/atendente/medicamentos">Medicamentos</a>
            <a class="nav-link" href="/atendente/consultas">Consultas</a>
            <a class="nav-link" href="/medico/login">Área do Médico</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Medicamentos</h2>
        <a href="/atendente/medicamentos/novo" class="btn btn-success">Novo Medicamento</a>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Nome</th>
                <th>Dosagem</th>
                <th>Tipo</th>
                <th>Descrição</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="med : ${medicamentos}">
                <td th:text="${med.codigo}"></td>
                <td th:text="${med.nome}"></td>
                <td th:text="${med.dosagem}"></td>
                <td th:text="${med.tipoDosagem}"></td>
                <td th:text="${med.descricao}"></td>
                <td>
                    <a th:href="@{/atendente/medicamentos/{codigo}/editar(codigo=${med.codigo})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/atendente/medicamentos/{codigo}/excluir(codigo=${med.codigo})}" class="btn btn-sm btn-danger" onclick="return confirm('Excluir medicamento?')">Excluir</a>
                </td>
            </tr>
            <tr th:if="${medicamentos == null || medicamentos.isEmpty()}">
                <td colspan="6" class="text-center">Nenhum medicamento cadastrado.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
