<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${medicamento.codigo > 0} ? 'Editar Medicamento' : 'Novo Medicamento'">Medicamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/atendente">Sistema Médico</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/atendente/pacientes">Pacientes</a>
            <a class="nav-link" href="/atendente/medicos">Médicos</a>
            <a class="nav-link" href="/atendente/medicamentos">Medicamentos</a>
            <a class="nav-link" href="/atendente/consultas">Consultas</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${medicamento.codigo > 0} ? 'Editar Medicamento' : 'Novo Medicamento'"></h2>

    <form th:action="@{/atendente/medicamentos}" th:object="${medicamento}" method="post">
        <input type="hidden" th:field="*{codigo}"/>

        <div class="mb-3">
            <label class="form-label">Nome:</label>
            <input type="text" class="form-control" th:field="*{nome}" required/>
        </div>

        <div class="mb-3">
            <label class="form-label">Dosagem:</label>
            <input type="number" class="form-control" th:field="*{dosagem}"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Tipo de Dosagem:</label>
            <input type="text" class="form-control" th:field="*{tipoDosagem}" placeholder="Ex: mg, ml"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Descrição:</label>
            <input type="text" class="form-control" th:field="*{descricao}"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Observação:</label>
            <input type="text" class="form-control" th:field="*{observacao}"/>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/atendente/medicamentos" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
