<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${medicamento.codigo > 0} ? 'Editar Medicamento' : 'Novo Medicamento'">Medicamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary min-vh-100 d-flex flex-column">
<nav class="navbar navbar-expand-lg sticky-top" style="background: linear-gradient(135deg, #1e3c72, #2a5298);">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/atendente">
            <i class="bi bi-heart-pulse-fill me-2"></i>Clínica Saúde+
        </a>
        <div class="navbar-nav ms-auto d-flex flex-row">
            <a class="nav-link text-white" href="/atendente/pacientes">Pacientes</a>
            <a class="nav-link text-white" href="/atendente/medicos">Médicos</a>
            <a class="nav-link text-white" href="/atendente/medicamentos">Medicamentos</a>
            <a class="nav-link text-white" href="/atendente/consultas">Consultas</a>
        </div>
    </div>
</nav>

<div class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0">
                        <i class="bi bi-capsule text-danger me-2"></i>
                        <span th:text="${medicamento.codigo > 0} ? 'Editar Medicamento' : 'Novo Medicamento'"></span>
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/atendente/medicamentos}" th:object="${medicamento}" method="post">
                        <input type="hidden" th:field="*{codigo}"/>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Nome</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-capsule"></i></span>
                                <input type="text" class="form-control" th:field="*{nome}" required placeholder="Nome do medicamento"/>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Dosagem</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" th:field="*{dosagem}" placeholder="500"/>
                                    <span class="input-group-text" th:text="${medicamento.tipoDosagem} ?: 'un'"></span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Tipo de Dosagem</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-droplet"></i></span>
                                    <input type="text" class="form-control" th:field="*{tipoDosagem}" placeholder="mg, ml, g..."/>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Descrição</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-info-circle"></i></span>
                                <input type="text" class="form-control" th:field="*{descricao}" placeholder="Breve descrição do medicamento"/>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">Observação</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-journal-text"></i></span>
                                <input type="text" class="form-control" th:field="*{observacao}" placeholder="Observações adicionais"/>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>Salvar
                            </button>
                            <a href="/atendente/medicamentos" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-2 mt-auto">
    <small>&copy; 2026 Clínica Saúde+</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
