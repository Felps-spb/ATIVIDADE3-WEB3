<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/atendente">Sistema Médico</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/atendente/pacientes">Pacientes</a>
            <a class="nav-link" href="/atendente/medicos">Médicos</a>
            <a class="nav-link" href="/atendente/medicamentos">Medicamentos</a>
            <a class="nav-link active" href="/atendente/consultas">Consultas</a>
            <a class="nav-link" href="/medico/login">Área do Médico</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Consultas</h2>
        <a href="/atendente/consultas/nova" class="btn btn-success">Nova Consulta</a>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Data/Hora</th>
                <th>Retorno</th>
                <th>Paciente</th>
                <th>Médico</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="consulta : ${consultas}">
                <td th:text="${consulta.codigo}"></td>
                <td th:text="${consulta.dataHora}"></td>
                <td th:text="${consulta.dataHoraVolta}"></td>
                <td th:text="${consulta.pacienteNome}"></td>
                <td th:text="${consulta.medicoNome}"></td>
                <td>
                    <a th:href="@{/atendente/consultas/{codigo}/excluir(codigo=${consulta.codigo})}" class="btn btn-sm btn-danger" onclick="return confirm('Excluir consulta?')">Excluir</a>
                </td>
            </tr>
            <tr th:if="${consultas == null || consultas.isEmpty()}">
                <td colspan="6" class="text-center">Nenhuma consulta cadastrada.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
