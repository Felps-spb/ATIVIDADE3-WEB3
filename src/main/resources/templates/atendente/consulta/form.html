<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary min-vh-100 d-flex flex-column">
<nav class="navbar navbar-expand-lg sticky-top" style="background: linear-gradient(135deg, #1e3c72, #2a5298);">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/atendente">
            <i class="bi bi-heart-pulse-fill me-2"></i>Clínica Saúde+
        </a>
        <div class="navbar-nav ms-auto d-flex flex-row">
            <a class="nav-link text-white" href="/atendente/pacientes">Pacientes</a>
            <a class="nav-link text-white" href="/atendente/medicos">Médicos</a>
            <a class="nav-link text-white" href="/atendente/medicamentos">Medicamentos</a>
            <a class="nav-link text-white" href="/atendente/consultas">Consultas</a>
        </div>
    </div>
</nav>

<div class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0">
                        <i class="bi bi-calendar-plus-fill text-info me-2"></i>Nova Consulta
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/atendente/consultas}" th:object="${consulta}" method="post">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Paciente</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <select class="form-select" th:field="*{pacienteCpf}" required>
                                        <option value="">Selecione...</option>
                                        <option th:each="p : ${pacientes}" th:value="${p.cpf}" th:text="${p.nome}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Médico</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-heart-pulse"></i></span>
                                    <select class="form-select" th:field="*{medicoCrm}" required>
                                        <option value="">Selecione...</option>
                                        <option th:each="m : ${medicos}" th:value="${m.crm}" th:text="${m.nome + ' - ' + m.especialidade}"></option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Data/Hora</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                                    <input type="text" class="form-control" th:field="*{dataHora}" required placeholder="15/07/2026 14:30"/>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Data/Hora de Retorno</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-arrow-return-left"></i></span>
                                    <input type="text" class="form-control" th:field="*{dataHoraVolta}" placeholder="15/08/2026 14:30"/>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">Observação</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-journal-text"></i></span>
                                <textarea class="form-control" th:field="*{observacao}" rows="3" placeholder="Observações sobre a consulta..."></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>Agendar Consulta
                            </button>
                            <a href="/atendente/consultas" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-2 mt-auto">
    <small>&copy; 2026 Clínica Saúde+</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
