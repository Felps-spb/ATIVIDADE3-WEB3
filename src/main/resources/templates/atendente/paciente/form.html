<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${paciente.cpf != null} ? 'Editar Paciente' : 'Novo Paciente'">Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/atendente">Sistema Médico</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/atendente/pacientes">Pacientes</a>
            <a class="nav-link" href="/atendente/medicos">Médicos</a>
            <a class="nav-link" href="/atendente/medicamentos">Medicamentos</a>
            <a class="nav-link" href="/atendente/consultas">Consultas</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${paciente.cpf != null} ? 'Editar Paciente' : 'Novo Paciente'"></h2>

    <form th:action="@{/atendente/pacientes}" th:object="${paciente}" method="post">
        <input type="hidden" th:field="*{cpf}" th:if="${paciente.cpf != null}"/>

        <div class="mb-3" th:unless="${paciente.cpf != null}">
            <label class="form-label">CPF:</label>
            <input type="text" class="form-control" th:field="*{cpf}" required maxlength="14"/>
        </div>

        <div class="mb-3" th:if="${paciente.cpf != null}">
            <label class="form-label">CPF:</label>
            <input type="text" class="form-control" th:field="*{cpf}" readonly/>
        </div>

        <div class="mb-3">
            <label class="form-label">Nome:</label>
            <input type="text" class="form-control" th:field="*{nome}" required/>
        </div>

        <div class="mb-3">
            <label class="form-label">Endereço:</label>
            <input type="text" class="form-control" th:field="*{endereco}"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Contato:</label>
            <input type="text" class="form-control" th:field="*{contato}"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Plano de Saúde:</label>
            <input type="text" class="form-control" th:field="*{planoSaude}"/>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/atendente/pacientes" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
