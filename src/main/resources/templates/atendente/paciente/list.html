<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/atendente">Sistema Médico</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="/atendente/pacientes">Pacientes</a>
            <a class="nav-link" href="/atendente/medicos">Médicos</a>
            <a class="nav-link" href="/atendente/medicamentos">Medicamentos</a>
            <a class="nav-link" href="/atendente/consultas">Consultas</a>
            <a class="nav-link" href="/medico/login">Área do Médico</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Pacientes</h2>
        <a href="/atendente/pacientes/novo" class="btn btn-success">Novo Paciente</a>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>CPF</th>
                <th>Nome</th>
                <th>Contato</th>
                <th>Plano de Saúde</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="paciente : ${pacientes}">
                <td th:text="${paciente.cpf}"></td>
                <td th:text="${paciente.nome}"></td>
                <td th:text="${paciente.contato}"></td>
                <td th:text="${paciente.planoSaude}"></td>
                <td>
                    <a th:href="@{/atendente/pacientes/{cpf}/editar(cpf=${paciente.cpf})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/atendente/pacientes/{cpf}/excluir(cpf=${paciente.cpf})}" class="btn btn-sm btn-danger" onclick="return confirm('Excluir paciente?')">Excluir</a>
                </td>
            </tr>
            <tr th:if="${pacientes == null || pacientes.isEmpty()}">
                <td colspan="5" class="text-center">Nenhum paciente cadastrado.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
