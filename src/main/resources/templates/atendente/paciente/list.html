<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary min-vh-100 d-flex flex-column">
<nav class="navbar navbar-expand-lg sticky-top" style="background: linear-gradient(135deg, #1e3c72, #2a5298);">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/atendente">
            <i class="bi bi-heart-pulse-fill me-2"></i>Clínica Saúde+
        </a>
        <div class="navbar-nav ms-auto d-flex flex-row">
            <a class="nav-link text-white" href="/atendente/pacientes">Pacientes</a>
            <a class="nav-link text-white" href="/atendente/medicos">Médicos</a>
            <a class="nav-link text-white" href="/atendente/medicamentos">Medicamentos</a>
            <a class="nav-link text-white" href="/atendente/consultas">Consultas</a>
            <a class="nav-link text-white-50" href="/medico/login"><i class="bi bi-person-badge me-1"></i>Área do Médico</a>
        </div>
    </div>
</nav>

<div class="container py-4 flex-grow-1">
    <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show d-flex align-items-center" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${mensagem}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h5 class="mb-0"><i class="bi bi-people-fill text-primary me-2"></i>Pacientes</h5>
            <a href="/atendente/pacientes/novo" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Novo Paciente
            </a>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">CPF</th>
                            <th>Nome</th>
                            <th>Contato</th>
                            <th>Plano de Saúde</th>
                            <th class="text-end pe-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="paciente : ${pacientes}">
                            <td class="ps-4"><code th:text="${paciente.cpf}"></code></td>
                            <td class="fw-medium" th:text="${paciente.nome}"></td>
                            <td th:text="${paciente.contato} ?: '-'"></td>
                            <td><span class="badge bg-info bg-opacity-10 text-info" th:text="${paciente.planoSaude} ?: 'Particular'"></span></td>
                            <td class="text-end pe-4">
                                <a th:href="@{/atendente/pacientes/{cpf}/editar(cpf=${paciente.cpf})}" class="btn btn-sm btn-outline-warning me-1" title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/atendente/pacientes/{cpf}/excluir(cpf=${paciente.cpf})}" class="btn btn-sm btn-outline-danger" title="Excluir" onclick="return confirm('Excluir paciente?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${pacientes == null || pacientes.isEmpty()}">
                            <td colspan="5" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-3 d-block mb-2"></i>Nenhum paciente cadastrado
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-2 mt-auto">
    <small>&copy; 2026 Clínica Saúde+</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
