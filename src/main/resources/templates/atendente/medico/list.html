<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Médicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/atendente">Sistema Médico</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/atendente/pacientes">Pacientes</a>
            <a class="nav-link active" href="/atendente/medicos">Médicos</a>
            <a class="nav-link" href="/atendente/medicamentos">Medicamentos</a>
            <a class="nav-link" href="/atendente/consultas">Consultas</a>
            <a class="nav-link" href="/medico/login">Área do Médico</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Médicos</h2>
        <a href="/atendente/medicos/novo" class="btn btn-success">Novo Médico</a>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>CRM</th>
                <th>Nome</th>
                <th>Especialidade</th>
                <th>Contato</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="medico : ${medicos}">
                <td th:text="${medico.crm}"></td>
                <td th:text="${medico.nome}"></td>
                <td th:text="${medico.especialidade}"></td>
                <td th:text="${medico.contato}"></td>
                <td>
                    <a th:href="@{/atendente/medicos/{crm}/editar(crm=${medico.crm})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/atendente/medicos/{crm}/excluir(crm=${medico.crm})}" class="btn btn-sm btn-danger" onclick="return confirm('Excluir médico?')">Excluir</a>
                </td>
            </tr>
            <tr th:if="${medicos == null || medicos.isEmpty()}">
                <td colspan="5" class="text-center">Nenhum médico cadastrado.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
