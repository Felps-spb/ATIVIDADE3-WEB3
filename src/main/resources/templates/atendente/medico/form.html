<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${medico.crm != null} ? 'Editar Médico' : 'Novo Médico'">Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary min-vh-100 d-flex flex-column">
<nav class="navbar navbar-expand-lg sticky-top" style="background: linear-gradient(135deg, #1e3c72, #2a5298);">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/atendente">
            <i class="bi bi-heart-pulse-fill me-2"></i>Clínica Saúde+
        </a>
        <div class="navbar-nav ms-auto d-flex flex-row">
            <a class="nav-link text-white" href="/atendente/pacientes">Pacientes</a>
            <a class="nav-link text-white" href="/atendente/medicos">Médicos</a>
            <a class="nav-link text-white" href="/atendente/medicamentos">Medicamentos</a>
            <a class="nav-link text-white" href="/atendente/consultas">Consultas</a>
        </div>
    </div>
</nav>

<div class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0">
                        <i class="bi bi-heart-pulse-fill text-danger me-2"></i>
                        <span th:text="${medico.crm != null} ? 'Editar Médico' : 'Novo Médico'"></span>
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/atendente/medicos}" th:object="${medico}" method="post">
                        <input type="hidden" th:field="*{crm}" th:if="${medico.crm != null}"/>

                        <div class="mb-3" th:unless="${medico.crm != null}">
                            <label class="form-label fw-medium">CRM</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                <input type="text" class="form-control" th:field="*{crm}" required maxlength="20" placeholder="CRM000"/>
                            </div>
                        </div>

                        <div class="mb-3" th:if="${medico.crm != null}">
                            <label class="form-label fw-medium">CRM</label>
                            <p class="form-control-plaintext fw-bold text-primary" th:text="${medico.crm}"></p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Nome</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" th:field="*{nome}" required placeholder="Nome completo"/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Especialidade</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-star"></i></span>
                                <input type="text" class="form-control" th:field="*{especialidade}" placeholder="Ex: Cardiologia"/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Contato</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                <input type="text" class="form-control" th:field="*{contato}" placeholder="(99) 99999-9999"/>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">Senha</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" th:field="*{senha}" required placeholder="Senha de acesso"/>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>Salvar
                            </button>
                            <a href="/atendente/medicos" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-2 mt-auto">
    <small>&copy; 2026 Clínica Saúde+</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
