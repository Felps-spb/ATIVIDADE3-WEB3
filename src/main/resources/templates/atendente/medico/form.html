<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${medico.crm != null} ? 'Editar Médico' : 'Novo Médico'">Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/atendente">Sistema Médico</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/atendente/pacientes">Pacientes</a>
            <a class="nav-link" href="/atendente/medicos">Médicos</a>
            <a class="nav-link" href="/atendente/medicamentos">Medicamentos</a>
            <a class="nav-link" href="/atendente/consultas">Consultas</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${medico.crm != null} ? 'Editar Médico' : 'Novo Médico'"></h2>

    <form th:action="@{/atendente/medicos}" th:object="${medico}" method="post">
        <input type="hidden" th:field="*{crm}" th:if="${medico.crm != null}"/>

        <div class="mb-3" th:unless="${medico.crm != null}">
            <label class="form-label">CRM:</label>
            <input type="text" class="form-control" th:field="*{crm}" required maxlength="20"/>
        </div>

        <div class="mb-3" th:if="${medico.crm != null}">
            <label class="form-label">CRM:</label>
            <input type="text" class="form-control" th:field="*{crm}" readonly/>
        </div>

        <div class="mb-3">
            <label class="form-label">Nome:</label>
            <input type="text" class="form-control" th:field="*{nome}" required/>
        </div>

        <div class="mb-3">
            <label class="form-label">Especialidade:</label>
            <input type="text" class="form-control" th:field="*{especialidade}"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Contato:</label>
            <input type="text" class="form-control" th:field="*{contato}"/>
        </div>

        <div class="mb-3">
            <label class="form-label">Senha:</label>
            <input type="password" class="form-control" th:field="*{senha}" required/>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/atendente/medicos" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
