<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Médico - Consultas Pendentes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="/medico/home">Sistema Médico</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link active" href="/medico/home">Consultas Pendentes</a>
            <a class="nav-link" href="/medico/consultas-realizadas">Consultas Realizadas</a>
            <span class="navbar-text me-3" th:text="'Dr(a). ' + ${medico.nome}"></span>
            <a class="nav-link" href="/medico/logout">Sair</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>

    <h2>Consultas Pendentes</h2>
    <p class="text-muted">Consultas agendadas que ainda não possuem prontuário</p>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Data/Hora</th>
                <th>Paciente</th>
                <th>Observação</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="consulta : ${consultasPendentes}">
                <td th:text="${consulta.codigo}"></td>
                <td th:text="${consulta.dataHora}"></td>
                <td th:text="${consulta.pacienteNome}"></td>
                <td th:text="${consulta.observacao}"></td>
                <td>
                    <a th:href="@{/medico/consulta/{codigo}(codigo=${consulta.codigo})}" class="btn btn-sm btn-primary">Atender</a>
                </td>
            </tr>
            <tr th:if="${consultasPendentes == null || consultasPendentes.isEmpty()}">
                <td colspan="5" class="text-center">Nenhuma consulta pendente.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
