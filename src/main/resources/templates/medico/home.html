<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultas Pendentes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary min-vh-100 d-flex flex-column">
<nav class="navbar navbar-expand-lg sticky-top" style="background: linear-gradient(135deg, #11998e, #38ef7d);">
    <div class="container">
        <a class="navbar-brand text-white fw-bold" href="/medico/home">
            <i class="bi bi-heart-pulse-fill me-2"></i>Clínica Saúde+
        </a>
        <div class="navbar-nav ms-auto d-flex flex-row align-items-center">
            <a class="nav-link text-white fw-medium" href="/medico/home"><i class="bi bi-clock me-1"></i>Pendentes</a>
            <a class="nav-link text-white" href="/medico/consultas-realizadas"><i class="bi bi-check-all me-1"></i>Realizadas</a>
            <span class="navbar-text text-white-50 me-3 small" th:text="'Dr(a). ' + ${medico.nome}"></span>
            <a class="nav-link text-white" href="/medico/logout" title="Sair"><i class="bi bi-box-arrow-right fs-5"></i></a>
        </div>
    </div>
</nav>

<div class="container py-4 flex-grow-1">
    <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show d-flex align-items-center" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${mensagem}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex align-items-center mb-4">
        <div class="icon-circle-sm bg-success bg-opacity-10 text-success me-3">
            <i class="bi bi-clock-fill fs-4"></i>
        </div>
        <div>
            <h4 class="mb-0">Consultas Pendentes</h4>
            <p class="text-muted small mb-0">Agendadas e aguardando atendimento</p>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Cód</th>
                            <th>Data/Hora</th>
                            <th>Paciente</th>
                            <th>Observação</th>
                            <th class="text-end pe-4">Ação</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="consulta : ${consultasPendentes}">
                            <td class="ps-4"><span class="badge bg-success" th:text="${consulta.codigo}"></span></td>
                            <td th:text="${consulta.dataHora}"></td>
                            <td class="fw-medium" th:text="${consulta.pacienteNome}"></td>
                            <td th:text="${consulta.observacao} ?: '-'"></td>
                            <td class="text-end pe-4">
                                <a th:href="@{/medico/consulta/{codigo}(codigo=${consulta.codigo})}" class="btn btn-sm btn-success">
                                    <i class="bi bi-pencil-square me-1"></i>Atender
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${consultasPendentes == null || consultasPendentes.isEmpty()}">
                            <td colspan="5" class="text-center py-5">
                                <i class="bi bi-emoji-smile fs-1 text-success d-block mb-2"></i>
                                <span class="text-muted">Nenhuma consulta pendente!</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-2 mt-auto">
    <small>&copy; 2026 Clínica Saúde+</small>
</footer>
<style>
.icon-circle-sm {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
