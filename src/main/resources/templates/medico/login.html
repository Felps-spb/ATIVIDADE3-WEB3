<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Área do Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #11998e, #38ef7d); min-height: 100vh;">
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <i class="bi bi-heart-pulse-fill text-white display-3"></i>
                <h2 class="text-white fw-bold mt-2">Clínica Saúde+</h2>
                <p class="text-white-50">Área restrita do médico</p>
            </div>

            <div class="card border-0 shadow-lg" style="border-radius: 1rem;">
                <div class="card-body p-4">
                    <h4 class="text-center mb-4 fw-bold text-success">
                        <i class="bi bi-person-badge me-2"></i>Login
                    </h4>

                    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${erro}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/medico/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-medium">CRM</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-vcard"></i></span>
                                <input type="text" class="form-control" name="crm" required placeholder="Seu CRM" autofocus/>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium">Senha</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" name="senha" required placeholder="Sua senha"/>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-medium">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="/atendente" class="text-muted text-decoration-none small">
                            <i class="bi bi-arrow-left me-1"></i>Voltar para o Atendente
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
